<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Confirmation – NeighborLink</title>
<link rel="stylesheet" href="/css/main.css">
<style>
.confirmation-hero { text-align: center; padding: 4rem 0 2rem; }
.success-icon { width: 90px; height: 90px; border-radius: 50%; background: var(--success-light); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 1.5rem; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.booking-detail-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 2rem; max-width: 600px; margin: 0 auto; }
.detail-row { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.85rem 0; border-bottom: 1px solid var(--border); font-size: 0.92rem; }
.detail-row:last-child { border-bottom: none; }
.detail-icon { font-size: 1.2rem; width: 24px; text-align: center; flex-shrink: 0; margin-top: 0.1rem; }
.detail-label { color: var(--ink-3); font-size: 0.82rem; margin-bottom: 0.2rem; }
.detail-value { font-weight: 600; color: var(--ink); }
.status-timeline { max-width: 600px; margin: 2rem auto; }
.timeline-step { display: flex; gap: 1rem; align-items: flex-start; }
.timeline-dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; flex-shrink: 0; margin-top: 0.1rem; }
.timeline-dot.done { background: var(--success); color: white; }
.timeline-dot.active { background: var(--primary); color: white; animation: pulse 1.5s infinite; }
.timeline-dot.pending { background: var(--surface-2); color: var(--ink-4); }
.timeline-line { width: 2px; height: 32px; background: var(--border); margin: 4px auto; margin-left: 15px; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(26,86,219,0.4); } 50% { box-shadow: 0 0 0 8px rgba(26,86,219,0); } }
</style>
</head>
<body>

<nav class="navbar">
  <div class="container navbar-inner">
    <a href="/" class="nav-logo">Neighbor<span class="dot">Link</span></a>
    <div class="nav-actions" id="nav-actions"></div>
  </div>
</nav>

<div class="container" style="padding-bottom:4rem;">
  <div class="confirmation-hero">
    <div class="success-icon" id="status-icon">⏳</div>
    <h2 id="main-title" style="margin-bottom:0.5rem;">Loading...</h2>
    <p id="main-sub" style="color:var(--ink-3);"></p>
  </div>

  <div class="booking-detail-card" id="booking-card">
    <div style="text-align:center;padding:2rem;"><div style="font-size:1.5rem;">⏳</div></div>
  </div>

  <!-- Status Timeline -->
  <div class="status-timeline" id="status-timeline" style="display:none;">
    <h4 style="margin-bottom:1.25rem;text-align:center;font-size:1rem;color:var(--ink-3);">Booking Progress</h4>
    <div>
      <div class="timeline-step">
        <div class="timeline-dot done" id="step-1">✓</div>
        <div style="padding-top:0.35rem;"><div style="font-weight:600;font-size:0.9rem;">Booking Placed</div><div style="font-size:0.8rem;color:var(--ink-3);">Your request has been sent to the provider</div></div>
      </div>
      <div class="timeline-line"></div>
      <div class="timeline-step">
        <div class="timeline-dot" id="step-2">2</div>
        <div style="padding-top:0.35rem;"><div style="font-weight:600;font-size:0.9rem;">Provider Confirmation</div><div style="font-size:0.8rem;color:var(--ink-3);">Waiting for provider to accept or reject</div></div>
      </div>
      <div class="timeline-line"></div>
      <div class="timeline-step">
        <div class="timeline-dot" id="step-3">3</div>
        <div style="padding-top:0.35rem;"><div style="font-weight:600;font-size:0.9rem;">Service Delivery</div><div style="font-size:0.8rem;color:var(--ink-3);">Provider arrives and completes the job</div></div>
      </div>
      <div class="timeline-line"></div>
      <div class="timeline-step">
        <div class="timeline-dot" id="step-4">★</div>
        <div style="padding-top:0.35rem;"><div style="font-weight:600;font-size:0.9rem;">Review & Rating</div><div style="font-size:0.8rem;color:var(--ink-3);">Share your experience to help the community</div></div>
      </div>
    </div>
  </div>

  <div style="display:flex;gap:1rem;justify-content:center;margin-top:2.5rem;flex-wrap:wrap;" id="action-buttons"></div>
</div>

<script src="/js/api.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  renderNavUser();
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { window.location.href = '/pages/dashboard.html'; return; }
  
  const res = await Api.booking(id);
  if (!res.success) {
    document.getElementById('booking-card').innerHTML = '<div class="empty-state"><div class="empty-state-icon">❌</div><div class="empty-state-title">Booking not found</div></div>';
    return;
  }
  
  const b = res.booking;
  const user = Api.getUser();
  
  // Status display
  const statusConfig = {
    pending: { icon: '⏳', title: 'Booking Request Sent!', sub: 'Your booking is waiting for the provider to accept. We\'ll notify you once confirmed.', iconBg: '#fef3c7', step: 2 },
    accepted: { icon: '✅', title: 'Booking Accepted!', sub: 'Great news! The provider has accepted your booking. Get ready for the service.', iconBg: 'var(--success-light)', step: 3 },
    completed: { icon: '🎉', title: 'Service Completed!', sub: 'The job is done! Please leave a review to help other users.', iconBg: '#ede9fe', step: 4 },
    rejected: { icon: '❌', title: 'Booking Rejected', sub: 'Unfortunately, the provider couldn\'t accept this booking. Please try booking another provider.', iconBg: '#fee2e2', step: 2 },
    cancelled: { icon: '🚫', title: 'Booking Cancelled', sub: 'This booking has been cancelled.', iconBg: 'var(--surface-2)', step: 1 },
  };
  
  const config = statusConfig[b.status] || statusConfig.pending;
  document.getElementById('status-icon').textContent = config.icon;
  document.getElementById('status-icon').style.background = config.iconBg;
  document.getElementById('main-title').textContent = config.title;
  document.getElementById('main-sub').textContent = config.sub;
  
  // Booking card
  document.getElementById('booking-card').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
      <h3 style="font-size:1.1rem;font-weight:800;">Booking #${b.id}</h3>
      ${Format.statusBadge(b.status)}
    </div>
    <div class="detail-row"><div class="detail-icon">🔧</div><div><div class="detail-label">Service</div><div class="detail-value">${b.service_icon||''} ${b.service_name}</div></div></div>
    ${b.provider_name ? `<div class="detail-row"><div class="detail-icon">👤</div><div><div class="detail-label">Provider</div><div class="detail-value">${b.provider_name}</div>${b.provider_phone ? `<div style="font-size:0.82rem;color:var(--ink-3);">📞 ${b.provider_phone}</div>` : ''}</div></div>` : ''}
    ${b.customer_name ? `<div class="detail-row"><div class="detail-icon">👤</div><div><div class="detail-label">Customer</div><div class="detail-value">${b.customer_name}</div></div></div>` : ''}
    <div class="detail-row"><div class="detail-icon">📅</div><div><div class="detail-label">Scheduled Date & Time</div><div class="detail-value">${Format.date(b.scheduled_date)} at ${Format.time(b.scheduled_time)}</div></div></div>
    <div class="detail-row"><div class="detail-icon">📍</div><div><div class="detail-label">Service Address</div><div class="detail-value">${b.address}</div></div></div>
    ${b.service_description ? `<div class="detail-row"><div class="detail-icon">📝</div><div><div class="detail-label">Description</div><div class="detail-value">${b.service_description}</div></div></div>` : ''}
    ${b.notes ? `<div class="detail-row"><div class="detail-icon">💬</div><div><div class="detail-label">Notes</div><div class="detail-value">${b.notes}</div></div></div>` : ''}
    ${b.price_estimate ? `<div class="detail-row"><div class="detail-icon">💰</div><div><div class="detail-label">Estimated Price</div><div class="detail-value">${Format.currency(b.price_estimate)}</div></div></div>` : ''}
    <div class="detail-row"><div class="detail-icon">🕐</div><div><div class="detail-label">Booked On</div><div class="detail-value">${Format.date(b.created_at)}</div></div></div>
  `;
  
  // Timeline
  document.getElementById('status-timeline').style.display = 'block';
  for (let i = 1; i <= 4; i++) {
    const dot = document.getElementById(`step-${i}`);
    if (i < config.step) { dot.className = 'timeline-dot done'; dot.textContent = '✓'; }
    else if (i === config.step) { dot.className = 'timeline-dot active'; }
    else { dot.className = 'timeline-dot pending'; }
  }
  
  // Action buttons
  const actBtns = document.getElementById('action-buttons');
  const dashUrl = user && user.role === 'provider' ? '/pages/provider-dashboard.html' : '/pages/dashboard.html';
  actBtns.innerHTML = `<a href="${dashUrl}" class="btn btn-outline">← Back to Dashboard</a><a href="/pages/services.html" class="btn btn-primary">🔍 Find More Services</a>`;
});
</script>
</body>
</html>
